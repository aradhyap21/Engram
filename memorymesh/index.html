<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryMesh</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #e6edf3;
    }

    .header h1 span {
      color: #7c3aed;
    }

    .header p {
      color: #8b949e;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    /* ── Panels ── */
    .panel {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .panel h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-bottom: 14px;
    }

    /* ── Inputs ── */
    textarea,
    input[type="text"] {
      width: 100%;
      background-color: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      transition: border-color 0.15s;
      outline: none;
      resize: vertical;
    }

    textarea:focus,
    input[type="text"]:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    textarea {
      min-height: 110px;
    }

    textarea::placeholder,
    input[type="text"]::placeholder {
      color: #484f58;
    }

    /* ── Button row ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background-color: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s, opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      background-color: #6d28d9;
    }

    button:active:not(:disabled) {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button.secondary {
      background-color: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
    }

    button.secondary:hover:not(:disabled) {
      background-color: #2d333b;
      border-color: #7c3aed;
    }

    /* ── Spinner ── */
    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Status line ── */
    #status {
      font-size: 13px;
      color: #8b949e;
      margin-top: 10px;
      min-height: 18px;
      transition: color 0.2s;
    }

    #status.error {
      color: #f85149;
    }

    /* ── Result card ── */
    #result-card {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      margin-top: 20px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    #result-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #result-card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-bottom: 16px;
    }

    /* ── Store result ── */
    .store-result {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .stat-badge {
      background-color: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 18px;
      text-align: center;
      flex: 1;
      min-width: 110px;
    }

    .stat-badge .stat-num {
      font-size: 1.6rem;
      font-weight: 700;
      color: #7c3aed;
      line-height: 1;
    }

    .stat-badge .stat-label {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 4px;
    }

    /* ── Path chain ── */
    .paths-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .path-card {
      background-color: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
    }

    .path-chain {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 13.5px;
    }

    .chain-node {
      background-color: #161b22;
      border: 1px solid #3d3d3d;
      border-radius: 5px;
      padding: 3px 10px;
      color: #e6edf3;
      font-weight: 500;
      white-space: nowrap;
    }

    .chain-arrow {
      color: #484f58;
      font-size: 12px;
    }

    .chain-edge {
      background-color: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.35);
      border-radius: 12px;
      padding: 2px 10px;
      color: #a78bfa;
      font-size: 12px;
      white-space: nowrap;
    }

    .path-meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cost-badge {
      font-size: 11px;
      color: #8b949e;
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 7px;
    }

    /* ── Insight ── */
    .insight-text {
      font-size: 15px;
      line-height: 1.7;
      color: #e6edf3;
      white-space: pre-wrap;
    }

    .insight-sub {
      margin-top: 14px;
      font-size: 12px;
      color: #8b949e;
    }

    /* ── Error state ── */
    .error-box {
      background-color: rgba(248, 81, 73, 0.08);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: 8px;
      padding: 14px 16px;
      color: #f85149;
      font-size: 13.5px;
    }

    .empty-state {
      text-align: center;
      padding: 20px 0;
      color: #8b949e;
      font-size: 13.5px;
    }

    .empty-state .empty-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background-color: #21262d;
      margin: 6px 0 16px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Memory<span>Mesh</span></h1>
      <p>Causal graph memory engine with Ebbinghaus decay</p>
    </div>

    <!-- Store Memory panel -->
    <div class="panel">
      <h2>Store Memory</h2>
      <textarea
        id="memory-text"
        placeholder="Enter text to store as memory..."
      ></textarea>
      <div class="btn-row">
        <button id="store-btn" onclick="storeMemory()">Store Memory</button>
      </div>
    </div>

    <!-- Retrieve / Synthesize panel -->
    <div class="panel">
      <h2>Retrieve &amp; Synthesize</h2>
      <input
        type="text"
        id="query-input"
        placeholder="Search your memories..."
      />
      <div class="btn-row">
        <button id="retrieve-btn" onclick="retrieveMemory()">Retrieve</button>
        <button id="synthesize-btn" class="secondary" onclick="synthesizeMemory()">Synthesize</button>
      </div>
    </div>

    <!-- Status -->
    <div id="status"></div>

    <!-- Result card (hidden by default) -->
    <div id="result-card">
      <h2 id="result-title">Result</h2>
      <div class="divider"></div>
      <div id="result-body"></div>
    </div>

  </div>

  <script>
    const API_BASE = "http://localhost:8000";

    /* ── Helpers ── */

    function setStatus(msg, isError) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = isError ? "error" : "";
    }

    function showResult(titleText, bodyHTML) {
      document.getElementById("result-title").textContent = titleText;
      document.getElementById("result-body").innerHTML = bodyHTML;
      const card = document.getElementById("result-card");
      card.classList.add("visible");
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.dataset.originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span>Loading...';
      } else {
        btn.disabled = false;
        if (btn.dataset.originalText) {
          btn.innerHTML = btn.dataset.originalText;
        }
      }
    }

    function disableAllButtons(disabled) {
      ["store-btn", "retrieve-btn", "synthesize-btn"].forEach(function(id) {
        document.getElementById(id).disabled = disabled;
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function showError(message) {
      showResult("Error", '<div class="error-box">' + escapeHtml(message) + '</div>');
      setStatus("Request failed.", true);
    }

    /* ── Store Memory ── */

    function storeMemory() {
      var text = document.getElementById("memory-text").value.trim();

      if (!text) {
        setStatus("Please enter some text before storing.", true);
        return;
      }

      setStatus("Storing memory…", false);
      setLoading("store-btn", true);
      disableAllButtons(true);
      document.getElementById("store-btn").disabled = true; // already set but be explicit

      fetch(API_BASE + "/memory", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text })
      })
      .then(function(res) {
        return res.json().then(function(data) {
          return { ok: res.ok, status: res.status, data: data };
        });
      })
      .then(function(result) {
        disableAllButtons(false);
        setLoading("store-btn", false);

        if (!result.ok || result.data.error) {
          var errMsg = (result.data && result.data.error) || ("Server error " + result.status);
          showError(errMsg);
          return;
        }

        var d = result.data;
        var nodes = d.nodes_stored !== undefined ? d.nodes_stored : "?";
        var edges = d.edges_stored !== undefined ? d.edges_stored : "?";

        var html =
          '<div class="store-result">' +
            '<div class="stat-badge">' +
              '<div class="stat-num">' + escapeHtml(String(nodes)) + '</div>' +
              '<div class="stat-label">Nodes stored</div>' +
            '</div>' +
            '<div class="stat-badge">' +
              '<div class="stat-num">' + escapeHtml(String(edges)) + '</div>' +
              '<div class="stat-label">Edges stored</div>' +
            '</div>' +
          '</div>';

        showResult("Memory Stored", html);
        setStatus("Stored " + nodes + " nodes, " + edges + " edges.", false);
        document.getElementById("memory-text").value = "";
      })
      .catch(function(err) {
        disableAllButtons(false);
        setLoading("store-btn", false);
        showError("Network error: " + err.message);
      });
    }

    /* ── Retrieve Memory ── */

    function retrieveMemory() {
      var query = document.getElementById("query-input").value.trim();

      if (!query) {
        setStatus("Please enter a search query.", true);
        return;
      }

      setStatus("Retrieving memory paths…", false);
      setLoading("retrieve-btn", true);
      disableAllButtons(true);

      fetch(API_BASE + "/memory/retrieve?query=" + encodeURIComponent(query))
      .then(function(res) {
        return res.json().then(function(data) {
          return { ok: res.ok, status: res.status, data: data };
        });
      })
      .then(function(result) {
        disableAllButtons(false);
        setLoading("retrieve-btn", false);

        if (!result.ok || result.data.error) {
          var errMsg = (result.data && result.data.error) || ("Server error " + result.status);
          showError(errMsg);
          return;
        }

        var paths = result.data.paths || [];
        var html = renderPaths(paths);
        showResult("Memory Paths", html);
        setStatus("Found " + paths.length + " path" + (paths.length !== 1 ? "s" : "") + " for \"" + escapeHtml(query) + "\".", false);
      })
      .catch(function(err) {
        disableAllButtons(false);
        setLoading("retrieve-btn", false);
        showError("Network error: " + err.message);
      });
    }

    /* ── Synthesize Memory ── */

    function synthesizeMemory() {
      var query = document.getElementById("query-input").value.trim();

      if (!query) {
        setStatus("Please enter a search query.", true);
        return;
      }

      setStatus("Synthesizing insight…", false);
      setLoading("synthesize-btn", true);
      disableAllButtons(true);

      fetch(API_BASE + "/memory/synthesize?query=" + encodeURIComponent(query))
      .then(function(res) {
        return res.json().then(function(data) {
          return { ok: res.ok, status: res.status, data: data };
        });
      })
      .then(function(result) {
        disableAllButtons(false);
        setLoading("synthesize-btn", false);

        if (!result.ok || result.data.error) {
          var errMsg = (result.data && result.data.error) || ("Server error " + result.status);
          showError(errMsg);
          return;
        }

        var d = result.data;
        var insight = d.insight || "(no insight returned)";
        var pathsUsed = d.paths_used !== undefined ? d.paths_used : "?";

        var html =
          '<p class="insight-text">' + escapeHtml(insight) + '</p>' +
          '<p class="insight-sub">Based on ' + escapeHtml(String(pathsUsed)) + ' path' + (pathsUsed !== 1 ? 's' : '') + '</p>';

        showResult("Synthesized Insight", html);
        setStatus("Synthesis complete.", false);
      })
      .catch(function(err) {
        disableAllButtons(false);
        setLoading("synthesize-btn", false);
        showError("Network error: " + err.message);
      });
    }

    /* ── Path rendering ── */

    function renderPaths(paths) {
      if (!paths || paths.length === 0) {
        return (
          '<div class="empty-state">' +
            '<div class="empty-icon">🔍</div>' +
            '<div>No memory paths found.<br>Try storing some memories first.</div>' +
          '</div>'
        );
      }

      var html = '<div class="paths-list">';

      for (var i = 0; i < paths.length; i++) {
        var p = paths[i];
        var nodes = p.path || [];
        var edges = p.edges || [];
        var totalCost = (p.total_cost !== undefined) ? Number(p.total_cost).toFixed(4) : "?";

        html += '<div class="path-card"><div class="path-chain">';

        for (var n = 0; n < nodes.length; n++) {
          var node = nodes[n];
          var label = node.content ? escapeHtml(node.content) : escapeHtml(node.id || "?");
          html += '<span class="chain-node" title="' + escapeHtml(node.entity_type || "") + '">' + label + '</span>';

          // Insert the edge between this node and the next
          if (n < edges.length) {
            var edge = edges[n];
            var rel = edge.relationship ? escapeHtml(edge.relationship) : "→";
            html += '<span class="chain-arrow">›</span>';
            html += '<span class="chain-edge">' + rel + '</span>';
            html += '<span class="chain-arrow">›</span>';
          }
        }

        html += '</div>';
        html +=
          '<div class="path-meta">' +
            '<span class="cost-badge">cost: ' + totalCost + '</span>' +
          '</div>';
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    /* ── Keyboard shortcut: Enter in query box triggers retrieve ── */
    document.getElementById("query-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        retrieveMemory();
      }
    });

    /* ── Keyboard shortcut: Ctrl+Enter in textarea triggers store ── */
    document.getElementById("memory-text").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        storeMemory();
      }
    });
  </script>
</body>
</html>
